services:
  - type: web
    name: physai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m rag.indexer
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: DOCS_DIR
        value: ../docs
      - key: OPENAI_API_KEY
        sync: false
